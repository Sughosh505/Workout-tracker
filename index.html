<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORGE — Workout Tracker</title>

  <!-- ─────────────────────────────────────────────────────────────
       GOOGLE FONTS
       • Bebas Neue  → Display headings / logo
       • DM Sans     → Body text, buttons, labels
       • Space Mono  → Numbers, timer, set data
       To swap fonts, replace the URL below and update style.css
  ───────────────────────────────────────────────────────────────── -->
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js for Muscle Group Graph -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       GLOBAL NAVIGATION BAR
       Always visible at the top. Contains:
       - Logo (left)
       - Tab switcher: Home / History (center)
       - Live workout timer — hidden by default, shown during session (right)
  ═══════════════════════════════════════════════════════════════ -->
  <nav class="nav" id="mainNav">
    <div class="nav-logo">FORGE<span>.</span></div>

    <!-- Tab buttons — JS toggles the .active class on these -->
    <div class="nav-tabs" id="navTabs">
      <button class="nav-tab active" onclick="showTab('home')">Home</button>
      <button class="nav-tab" onclick="showTab('history')">History</button>
    </div>

    <!-- Timer: hidden until a workout starts, shown via .visible class -->
    <div class="nav-timer" id="navTimer">
      ⏱ <span id="timerDisplay">0:00</span>
    </div>
  </nav>


  <!-- ═══════════════════════════════════════════════════════════════
       SCREEN: HOME / DASHBOARD
       Shown by default. Displays stats + start button + recent workouts.
       JS toggles .active to show/hide screens.
  ═══════════════════════════════════════════════════════════════ -->
  <div class="screen active" id="homeScreen">
    <div class="dashboard">

      <!-- Greeting section -->
      <div class="greeting">
        <div class="greeting-sub">Welcome back</div>
        <div class="greeting-title">LET'S <span>LIFT.</span></div>
      </div>

      <!-- Stats row — values injected by JS (updateDashboard) -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="statWorkouts">0</div>
          <div class="stat-label">Workouts</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statVolume">0</div>
          <div class="stat-label">Total kg</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statSets">0</div>
          <div class="stat-label">Total Sets</div>
        </div>
      </div>

      <!-- Muscle Chart Section -->
      <div class="muscle-chart-container" id="muscleChartContainer" style="display: none;">
        <div class="section-title">Muscle Groups Hit (Sets)</div>
        <div class="chart-wrapper">
          <canvas id="muscleChart"></canvas>
        </div>
      </div>

      <!-- Primary CTA — triggers startWorkout() in app.js -->
      <button class="start-btn" onclick="startWorkout()">⚡ START WORKOUT</button>

      <!-- Recent workouts list — rendered by renderRecentWorkouts() in app.js -->
      <div class="section-title">Recent Workouts</div>
      <div class="history-list" id="recentList">
        <!-- Populated dynamically by JavaScript -->
        <div class="empty-state">
          <div class="empty-icon">🏋️</div>
          <div class="empty-text">No workouts yet.<br />Start your first session above!</div>
        </div>
      </div>

    </div>
  </div><!-- end #homeScreen -->


  <!-- ═══════════════════════════════════════════════════════════════
       SCREEN: EXERCISE PICKER
       Shown when user taps "Start Workout" or "Add Exercise".
       Allows searching & filtering exercises, then adding them to session.
  ═══════════════════════════════════════════════════════════════ -->
  <div class="screen" id="pickerScreen">
    <div class="exercise-picker">

      <!-- Header: title + search bar -->
      <div class="picker-header">
        <div class="picker-title">ADD EXERCISES</div>
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <!-- oninput fires filterExercises() on every keystroke -->
          <input
            type="text"
            class="search-input"
            id="exerciseSearch"
            placeholder="Search exercises..."
            oninput="filterExercises()"
          />
        </div>
      </div>

      <!-- Muscle group filter chips — filterByMuscle() handles active state -->
      <div class="muscle-filters" id="muscleFilters">
        <button class="muscle-chip active" data-muscle="All"       onclick="filterByMuscle(this)">All</button>
        <button class="muscle-chip"        data-muscle="Chest"     onclick="filterByMuscle(this)">Chest</button>
        <button class="muscle-chip"        data-muscle="Back"      onclick="filterByMuscle(this)">Back</button>
        <button class="muscle-chip"        data-muscle="Shoulders" onclick="filterByMuscle(this)">Shoulders</button>
        <button class="muscle-chip"        data-muscle="Biceps"    onclick="filterByMuscle(this)">Biceps</button>
        <button class="muscle-chip"        data-muscle="Triceps"   onclick="filterByMuscle(this)">Triceps</button>
        <button class="muscle-chip"        data-muscle="Legs"      onclick="filterByMuscle(this)">Legs</button>
        <button class="muscle-chip"        data-muscle="Core"      onclick="filterByMuscle(this)">Core</button>
        <button class="muscle-chip"        data-muscle="Glutes"    onclick="filterByMuscle(this)">Glutes</button>
        <button class="muscle-chip"        data-muscle="Forearms"  onclick="filterByMuscle(this)">Forearms</button>
      </div>

      <!-- Exercise list — rendered by renderExerciseGrid() in app.js -->
      <div class="exercise-grid" id="exerciseGrid">
        <!-- Populated dynamically by JavaScript -->
      </div>

      <!-- Footer: Cancel + confirm selection -->
      <div class="picker-footer">
        <button class="btn-secondary" onclick="cancelPicker()">Cancel</button>
        <!-- Button text + disabled state managed by toggleExercise() -->
        <button class="btn-primary" id="addSelectedBtn" onclick="confirmExercises()" disabled>
          Add Exercises
        </button>
      </div>

    </div>
  </div><!-- end #pickerScreen -->


  <!-- ═══════════════════════════════════════════════════════════════
       SCREEN: ACTIVE WORKOUT
       The main logging screen during a live session.
       Contains: editable title, note, exercise blocks with sets.
  ═══════════════════════════════════════════════════════════════ -->
  <div class="screen" id="workoutScreen">
    <div class="workout-screen">

      <!-- Header: editable workout name + action buttons -->
      <div class="workout-header">
        <!-- Editable title input — value saved on finishWorkout() -->
        <input
          type="text"
          class="workout-title-input"
          id="workoutTitle"
          value="Morning Workout"
        />
        <div class="workout-actions">
          <!-- Discard: prompts confirmation then clears session -->
          <button class="icon-btn" onclick="discardWorkout()" title="Discard Workout">🗑</button>
          <!-- Finish: opens the summary modal -->
          <button class="icon-btn finish" onclick="openFinishModal()">Finish</button>
        </div>
      </div>

      <!-- Optional session note (saved with workout) -->
      <textarea
        class="workout-note"
        id="workoutNote"
        placeholder="Add a note... (optional)"
      ></textarea>

      <!-- Exercise blocks injected here by renderExerciseBlocks() in app.js -->
      <div id="exerciseBlocks">
        <!-- Each exercise gets a .exercise-block div with set rows inside -->
      </div>

      <!-- Floating action button to add more exercises mid-workout -->
      <button class="add-exercise-floating" onclick="openPicker()">
        <span>＋</span> Add Exercise
      </button>

    </div>
  </div><!-- end #workoutScreen -->


  <!-- ═══════════════════════════════════════════════════════════════
       SCREEN: HISTORY
       Full workout history list, newest first.
       Rendered by renderHistory() in app.js.
  ═══════════════════════════════════════════════════════════════ -->
  <div class="screen" id="historyScreen">
    <div class="history-screen">
      <div class="history-page-title">WORKOUT HISTORY</div>
      <div class="history-list" id="historyList">
        <!-- Populated dynamically by JavaScript -->
        <div class="empty-state">
          <div class="empty-icon">📅</div>
          <div class="empty-text">No workout history yet.</div>
        </div>
      </div>
    </div>
  </div><!-- end #historyScreen -->


  <!-- ═══════════════════════════════════════════════════════════════
       MODAL: FINISH WORKOUT SUMMARY
       Overlays any screen. Stats populated by openFinishModal() in app.js.
       "Save Workout" calls finishWorkout() to persist data.
  ═══════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="finishModal">
    <div class="modal">
      <div class="modal-icon">🏆</div>
      <div class="modal-title">WORKOUT DONE!</div>
      <!-- Duration text injected by openFinishModal() -->
      <div class="modal-subtitle" id="modalDuration">Duration: 0 min</div>

      <!-- Summary stats — values injected by openFinishModal() -->
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-val" id="modalExercises">0</div>
          <div class="modal-stat-label">Exercises</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-val" id="modalSets">0</div>
          <div class="modal-stat-label">Sets</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-val" id="modalVolume">0</div>
          <div class="modal-stat-label">Total kg</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeFinishModal()">Keep Going</button>
        <button class="btn-primary"   onclick="finishWorkout()">Save Workout</button>
      </div>
    </div>
  </div><!-- end #finishModal -->


  <!-- Main application logic -->
  <script src="app.js"></script>

</body>
</html>
